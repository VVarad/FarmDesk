{% if error %}
<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert">
  <strong class="font-bold">Error!</strong>
  <span class="block sm:inline">{{ error }}</span>
  <p class="text-sm mt-2">Did you configure SUPABASE_URL and SUPABASE_KEY in .env?</p>
</div>
{% elif plots %}
<ul class="space-y-3">
    {% for plot in plots %}
    <li class="flex items-center justify-between bg-gray-50 dark:bg-gray-700 p-4 rounded-lg shadow-sm border border-gray-100 dark:border-gray-600 transition-colors">
        <div>
            <div class="font-semibold text-gray-800 dark:text-gray-200">{{ plot.name }}</div>
            <div class="text-xs text-gray-500 dark:text-gray-400">ID: P{{ plot.id }} • 900 Plants</div>
        </div>
        <button hx-delete="/plots/{{ plot.id }}" 
                hx-target="#plot-list-container"
                hx-confirm="Are you sure? This will delete the plot and all 900 associated plants."
                class="text-red-500 hover:text-red-700 p-2 rounded-full hover:bg-red-50 dark:hover:bg-gray-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
            </svg>
        </button>
    </li>
    {% endfor %}
</ul>
{% else %}
<div class="text-center py-8 text-gray-500 dark:text-gray-400">
    No plots added yet. Add one above!
</div>
{% endif %}
